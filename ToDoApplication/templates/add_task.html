<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <title>タスク作成 - Todoアプリ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h4>新しいタスクの作成</h4>
                    </div>
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    <div class="card-body">
                        <form action="{{ url_for('add_task') }}" method="POST">
                            <div class="mb-3">
                                <label for="task_name" class="form-label">タスク名</label>
                                <input type="text" class="form-control" name="task_name" placeholder="例：漢字ドリル"
                                    required />
                            </div>

                            <div class="mb-3">
                                <label for="status" class="form-label">状態</label>
                                <select class="form-select" name="status">
                                    <option value="NOT_STARTED">未達成</option>
                                    <option value="IN_PROGRESS">進行中</option>
                                    <option value="COMPLETED">実施済み</option>
                                    <option value="PENDING">保留中</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">
                                    登録する
                                </button>
                                <a href="{{ url_for('home') }}" class="btn btn-secondary">一覧に戻る</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
