<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <title>ユーザー登録 - Todoアプリ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4>ユーザー登録</h4>
                    </div>
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    <div class="card-body">
                        <form action="{{ url_for('register') }}" method="POST">

                            <div class="mb-3">
                                <label for="login_id" class="form-label">ログインID</label>
                                <input type="text" class="form-control" name="login_id" id="login_id"
                                    placeholder="例：root" required />
                                <div class="form-text">
                                    半角英数字で作るのがおすすめです（例：taro123）。
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">パスワード</label>
                                <input type="password" class="form-control" name="password" id="password"
                                    placeholder="パスワードを入力" required />
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    登録する
                                </button>

                                <a href="{{ url_for('login') }}" class="btn btn-secondary">
                                    ログイン画面に戻る
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
