<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <title>タスク編集 - Todoアプリ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4>タスクの編集</h4>
                    </div>
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    <div class="card-body">
                        <form action="{{ url_for('edit_task', task_id=task.id) }}" method="POST">
                            <div class="mb-3">
                                <label for="task_name" class="form-label">タスク名</label>
                                <input type="text" class="form-control" name="task_name" value="{{ task.task_name }}"
                                    placeholder="例:漢字ドリル" required />
                            </div>

                            <div class="mb-3">
                                <label for="status" class="form-label">状態</label>
                                <select class="form-select" name="status">
                                    <option value="NOT_STARTED" {% if task.status.name=="NOT_STARTED" %}selected{% endif
                                        %}>未達成</option>
                                    <option value="IN_PROGRESS" {% if task.status.name=="IN_PROGRESS" %}selected{% endif
                                        %}>進行中</option>
                                    <option value="COMPLETED" {% if task.status.name=="COMPLETED" %}selected{% endif %}>
                                        実施済み</option>
                                    <option value="PENDING" {% if task.status.name=="PENDING" %}selected{% endif %}>保留中
                                    </option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">作成日時</label>
                                <input type="text" class="form-control" value="{{ task.created_at_jst }}" disabled />
                                <small class="text-muted">作成日時は変更できません</small>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    更新する
                                </button>
                                <a href="{{ url_for('home') }}" class="btn btn-secondary">一覧に戻る</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
